name: base_flutter
description: "A reusable Flutter base template."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core / DI
  get_it: ^9.2.0
  bloc: ^9.2.0
  flutter_bloc: ^9.1.1
  hydrated_bloc: ^10.1.1
  equatable: ^2.0.8
  dartz: ^0.10.1

  # Networking
  dio: ^5.9.1
  dio_cache_interceptor: ^4.0.5
  retrofit: ^4.9.2
  pretty_dio_logger: ^1.4.0
  http: ^1.6.0
  connectivity_plus: ^7.0.0

  # Firebase
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  firebase_crashlytics: ^5.1.0
  firebase_remote_config: ^6.1.4

  # Auth
  google_sign_in: ^7.2.0
  local_auth: ^2.3.0
  jwt_decoder: ^2.0.1
  flutter_secure_storage: ^10.0.0

  # Cache / Storage
  shared_preferences: ^2.5.4
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  path_provider: ^2.1.5

  # UI
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.2.3
  cached_network_image: ^3.4.1
  lottie: ^3.3.2
  shimmer: ^3.0.0
  skeletonizer: ^2.1.3
  toastification: ^3.0.3
  smooth_page_indicator: ^2.0.1
  pinput: ^6.0.2
  flutter_animate: ^4.5.2
  animate_do: ^5.1.0
  badges: ^3.1.2
  awesome_snackbar_content: ^0.1.8
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.1

  # Media
  image_picker: ^1.2.1
  file_picker: ^10.3.10
  photo_view: ^0.15.0
  video_player: ^2.10.1
  chewie: ^1.13.0
  appinio_video_player: any
  audioplayers: ^6.5.1
  audio_waveforms: ^2.0.2
  record: ^6.2.0

  # Utilities
  intl: ^0.20.2
  intl_utils: ^2.8.14
  freezed_annotation: ^3.1.0
  json_annotation: ^4.10.0
  url_launcher: ^6.3.2
  share_plus: ^10.0.0
  package_info_plus: ^9.0.0
  permission_handler: ^12.0.1
  device_info_plus: ^12.3.0
  uuid: ^4.5.2
  path: ^1.9.1
  crypto: ^3.0.7
  timeago: ^3.7.1
  upgrader: ^13.1.0
  stack_trace: ^1.12.1
  smart_auth: ^3.2.0

  # Deep linking / notifications
  app_links: ^7.0.0
  flutter_local_notifications: ^20.1.0

  # SignalR
  signalr_netcore: ^1.4.4

  # Security
  freerasp: ^6.6.0
  screen_protector: ^1.5.0
  flutter_windowmanager_plus: ^1.0.1

  # WebView
  webview_flutter: ^4.13.1
  webview_flutter_android: ^4.10.11
  webview_flutter_wkwebview: ^3.23.6
  webview_flutter_platform_interface: ^2.14.0
  flutter_inappwebview: ^6.1.5

  # Misc
  easy_date_timeline: ^2.0.9
  timelines_plus: ^1.0.8
  wave_blob: ^1.0.5

dependency_overrides:
  record_linux: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.11.1
  freezed: ^3.2.5
  json_serializable: ^6.12.0
  retrofit_generator: ^10.2.3
  hive_ce_generator: ^1.11.1
  bloc_test: ^10.0.0
  mocktail: ^1.0.5
  flutter_native_splash: ^2.4.7
  icons_launcher: ^3.0.3

icons_launcher:
  image_path: "assets/android12splash.png"
  platforms:
    android:
      enable: true
    ios:
      enable: true

flutter_intl:
  enabled: true
  main_locale: en
  arb_dir: lib/l10n
  output_dir: lib/generated

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/audios/
    - assets/fonts/
    - assets/icons/
    - assets/images/
    - assets/splash/
    - assets/lottie/
    - assets/svgs/

  # fonts: (add font files to assets/fonts/ first)
